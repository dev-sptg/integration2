name: Setup SDK

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest-m
    steps:
      - name: Checkout SDK repository
        uses: actions/checkout@v5
        with:
          repository: ProvableHQ/sdk
          path: sdk
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          toolchain: nightly-2025-08-28
          components: rust-std,rust-src
          target: wasm32-unknown-unknown

      - name: Set up Rust cache for WASM build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/wasm
          shared-key: sdk-wasm-cache
          save-if: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: sdk/yarn.lock

      - name: Install SDK dependencies
        working-directory: sdk
        run: yarn install --frozen-lockfile

      - name: Build SDK
        working-directory: sdk
        run: yarn build:all

      - name: Get SDK commit hash
        id: sdk-commit
        working-directory: sdk
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Create SDK tarball with local version marker
      - name: Create SDK tarball
        working-directory: sdk/sdk
        run: |
          # Mark version with local build identifier
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LOCAL_VERSION="${CURRENT_VERSION}-local-${{ steps.sdk-commit.outputs.hash }}"
          echo "Creating SDK tarball with version: $LOCAL_VERSION"
          
          # Update version in package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$LOCAL_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          # Create tarball
          yarn pack
          
          # Move tarball to known location
          mv provablehq-sdk-*.tgz ../sdk-local.tgz
          echo "SDK_LOCAL_VERSION=$LOCAL_VERSION" >> $GITHUB_ENV

      # Upload only the tarball and snarkOS binary path info
      # This reduces artifact size from ~1.2GB to ~50MB
      - name: Upload SDK build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sdk-build
          path: |
            sdk/sdk-local.tgz
            sdk/wasm/dist
            sdk/wasm/package.json
          retention-days: 1


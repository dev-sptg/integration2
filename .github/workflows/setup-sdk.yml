name: Setup SDK

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (tag, branch, or commit) to checkout'
        required: false
        type: string
        default: ''
      artifact_suffix:
        description: 'Suffix for artifact name (for matrix builds)'
        required: false
        type: string
        default: ''
    outputs:
      version:
        description: 'SDK version (tag or commit hash)'
        value: ${{ jobs.setup.outputs.version }}
      cache_hit:
        description: 'Whether the build was restored from cache'
        value: ${{ jobs.setup.outputs.cache_hit }}

jobs:
  setup:
    runs-on: ubuntu-latest-l
    outputs:
      version: ${{ steps.version.outputs.version }}
      cache_hit: ${{ steps.build-cache.outputs.cache-hit }}
    steps:
      - name: Determine cache key
        id: version
        run: |
          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then
            # No ref specified - get latest commit from default branch
            REF="default-$(date +%Y%m%d)"
          fi
          echo "version=$REF" >> $GITHUB_OUTPUT
          echo "Cache key: sdk-build-$REF"

      # Try to restore cached build first
      - name: Check for cached SDK build
        id: build-cache
        uses: actions/cache@v4
        with:
          path: sdk-build-cache
          key: sdk-build-${{ steps.version.outputs.version }}

      # If cache hit, skip the entire build process
      - name: Use cached build
        if: steps.build-cache.outputs.cache-hit == 'true'
        run: |
          echo "✅ Using cached SDK build for ${{ steps.version.outputs.version }}"
          ls -la sdk-build-cache/

      # Only checkout if we need to build
      - name: Checkout SDK repository
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: ProvableHQ/sdk
          path: sdk
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          toolchain: nightly-2025-08-28
          components: rust-std,rust-src
          target: wasm32-unknown-unknown

      - name: Set up Rust cache for WASM build
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/wasm
          shared-key: sdk-wasm-rust-${{ inputs.ref || 'default' }}
          save-if: true

      - name: Set up Node.js
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: sdk/yarn.lock

      - name: Install SDK dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: sdk
        run: yarn install --frozen-lockfile

      - name: Build SDK
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: sdk
        run: |
          echo "🔨 Building SDK ${{ steps.version.outputs.version }}..."
          yarn build:all

      - name: Get SDK commit hash
        if: steps.build-cache.outputs.cache-hit != 'true'
        id: sdk-commit
        working-directory: sdk
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Create SDK tarball with local version marker
      - name: Create SDK tarball
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: sdk/sdk
        run: |
          # Mark version with local build identifier
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LOCAL_VERSION="${CURRENT_VERSION}-local-${{ steps.sdk-commit.outputs.hash }}"
          echo "Creating SDK tarball with version: $LOCAL_VERSION"
          
          # Update version in package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$LOCAL_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          # Create tarball
          yarn pack
          
          # Move tarball to known location
          mv provablehq-sdk-*.tgz ../sdk-local.tgz

      # Save build artifacts to cache directory
      - name: Prepare build for caching
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdk-build-cache
          cp sdk/sdk-local.tgz sdk-build-cache/
          cp -r sdk/wasm/dist sdk-build-cache/wasm-dist
          cp sdk/wasm/package.json sdk-build-cache/wasm-package.json
          echo "Build artifacts saved for caching"

      # Upload artifact (from cache dir, works for both cached and fresh builds)
      - name: Upload SDK build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sdk-build${{ inputs.artifact_suffix }}
          path: |
            sdk-build-cache/sdk-local.tgz
            sdk-build-cache/wasm-dist
            sdk-build-cache/wasm-package.json
          retention-days: 1

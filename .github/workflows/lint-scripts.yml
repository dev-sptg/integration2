name: Lint Shell Scripts

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '.github/workflows/lint-scripts.yml'
  push:
    branches: [master]
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          check_together: 'yes'

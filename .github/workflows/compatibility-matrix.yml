name: Compatibility Matrix

on:
  schedule:
    - cron: '13 2 * * *'  # Run nightly at 02:13 UTC to avoid crowded timeslots
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      test_latest_only:
        description: 'Test only latest versions (skip older tags)'
        required: false
        type: boolean
        default: false
      snarkos_versions:
        description: 'snarkOS versions (comma-separated tags/branches, e.g., "v4.4.0,v4.3.0,mainnet")'
        required: false
        type: string
        default: ''
      sdk_versions:
        description: 'SDK versions (comma-separated tags/branches, e.g., "v0.9.12,v0.9.11,mainnet")'
        required: false
        type: string
        default: ''
      dps_versions:
        description: 'DPS versions (comma-separated tags/branches, e.g., "v0.17.0,v0.16.0,testnet")'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      snarkos_versions:
        description: 'snarkOS versions (comma-separated)'
        required: false
        type: string
        default: ''
      sdk_versions:
        description: 'SDK versions (comma-separated)'
        required: false
        type: string
        default: ''
      dps_versions:
        description: 'DPS versions (comma-separated)'
        required: false
        type: string
        default: ''

concurrency:
  group: compatibility-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Generate the version matrix from versions.json or inputs
  generate-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate version matrix
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read versions from config file
          VERSIONS_FILE="compatibility/versions.json"
          
          # Determine if we should fetch latest versions (Schedule or Manual flag)
          SHOULD_FETCH="false"
          if [ "${{ github.event_name }}" == "schedule" ]; then
            SHOULD_FETCH="true"
          elif [ "${{ inputs.test_latest_only }}" == "true" ]; then
            SHOULD_FETCH="true"
          fi

          SNARKOS_VERSIONS=""
          SDK_VERSIONS=""
          DPS_VERSIONS=""

          if [ "$SHOULD_FETCH" == "true" ]; then
            echo "Fetching latest versions from GitHub..."
            TEST_LATEST_N=$(jq -r '.test_latest_n_tags // 3' "$VERSIONS_FILE")
            INCLUDE_BRANCHES=$(jq -r '.include_branches // true' "$VERSIONS_FILE")
            
            if [ "${{ inputs.test_latest_only }}" == "true" ]; then
              TEST_LATEST_N=1
            fi
            
            # Fetch latest snarkOS tags
            echo "Fetching snarkOS tags..."
            if ! SNARKOS_TAGS=$(gh api repos/provableHQ/snarkOS/tags --jq ".[0:$TEST_LATEST_N] | .[].name" | tr '\n' ',' | sed 's/,$//'); then
              echo "❌ Failed to fetch snarkOS tags from GitHub API"
              exit 1
            fi
            if [ -z "$SNARKOS_TAGS" ]; then
              echo "❌ No snarkOS tags returned from GitHub API"
              exit 1
            fi
            echo "Found snarkOS tags: $SNARKOS_TAGS"
            
            # Fetch latest SDK tags
            echo "Fetching SDK tags..."
            if ! SDK_TAGS=$(gh api repos/ProvableHQ/sdk/tags --jq ".[0:$TEST_LATEST_N] | .[].name" | tr '\n' ',' | sed 's/,$//'); then
              echo "❌ Failed to fetch SDK tags from GitHub API"
              exit 1
            fi
            if [ -z "$SDK_TAGS" ]; then
              echo "❌ No SDK tags returned from GitHub API"
              exit 1
            fi
            echo "Found SDK tags: $SDK_TAGS"
            
            # Fetch latest DPS tags
            echo "Fetching DPS tags..."
            if ! DPS_TAGS=$(gh api repos/provableHQ/delegated-proving-service/tags --jq ".[0:$TEST_LATEST_N] | .[].name" | tr '\n' ',' | sed 's/,$//'); then
              echo "❌ Failed to fetch DPS tags from GitHub API"
              exit 1
            fi
            if [ -z "$DPS_TAGS" ]; then
              echo "❌ No DPS tags returned from GitHub API"
              exit 1
            fi
            echo "Found DPS tags: $DPS_TAGS"
            
            # Update versions.json
            echo "Updating versions.json with found tags..."
            jq --arg snarkos "$SNARKOS_TAGS" --arg sdk "$SDK_TAGS" --arg dps "$DPS_TAGS" '
              .snarkos.tags = ($snarkos | split(",")) |
              .sdk.tags = ($sdk | split(",")) |
              .dps.tags = ($dps | split(","))
            ' "$VERSIONS_FILE" > "${VERSIONS_FILE}.tmp" && mv "${VERSIONS_FILE}.tmp" "$VERSIONS_FILE"
            
            # Commit and push (skip on PR)
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add "$VERSIONS_FILE"
              
              if ! git diff --staged --quiet; then
                git commit -m "Update versions.json with latest tags [skip ci]"
                
                # Robust push with retry
                PUSH_SUCCESS=false
                for i in 1 2 3 4 5; do
                  if git push; then
                    echo "✅ Push succeeded"
                    PUSH_SUCCESS=true
                    break
                  fi
                  echo "Push failed, attempt $i/5 - pulling and retrying..."
                  git pull --rebase origin ${{ github.ref_name }}
                  sleep $((i * 2))
                done
                
                if [ "$PUSH_SUCCESS" = "false" ]; then
                  echo "❌ Failed to push changes after 5 attempts"
                  exit 1
                fi
                echo "✅ Updated and pushed versions.json"
              else
                echo "No changes to versions.json"
              fi
            else
              echo "Skipping commit/push on pull request"
            fi
            
            # Set versions for matrix (Add branches if configured)
            if [ "$INCLUDE_BRANCHES" == "true" ]; then
              SNARKOS_BRANCHES=$(jq -r '.snarkos.branches | join(",")' "$VERSIONS_FILE")
              SDK_BRANCHES=$(jq -r '.sdk.branches | join(",")' "$VERSIONS_FILE")
              DPS_BRANCHES=$(jq -r '.dps.branches | join(",")' "$VERSIONS_FILE")
              
              if [ -n "$SNARKOS_BRANCHES" ]; then
                SNARKOS_TAGS="${SNARKOS_TAGS},${SNARKOS_BRANCHES}"
              fi
              if [ -n "$SDK_BRANCHES" ]; then
                SDK_TAGS="${SDK_TAGS},${SDK_BRANCHES}"
              fi
              if [ -n "$DPS_BRANCHES" ]; then
                DPS_TAGS="${DPS_TAGS},${DPS_BRANCHES}"
              fi
            fi
            
            SNARKOS_VERSIONS="$SNARKOS_TAGS"
            SDK_VERSIONS="$SDK_TAGS"
            DPS_VERSIONS="$DPS_TAGS"

          else
            # Not fetching - use Inputs or existing versions.json
            
            # Get snarkOS versions
            if [ -n "${{ inputs.snarkos_versions }}" ]; then
              SNARKOS_VERSIONS="${{ inputs.snarkos_versions }}"
            else
              SNARKOS_TAGS=$(jq -r '.snarkos.tags | join(",")' "$VERSIONS_FILE")
              SNARKOS_BRANCHES=$(jq -r '.snarkos.branches | join(",")' "$VERSIONS_FILE")
              INCLUDE_BRANCHES=$(jq -r '.include_branches // true' "$VERSIONS_FILE")
              
              if [ "$INCLUDE_BRANCHES" == "true" ] && [ -n "$SNARKOS_BRANCHES" ]; then
                SNARKOS_VERSIONS="${SNARKOS_TAGS},${SNARKOS_BRANCHES}"
              else
                SNARKOS_VERSIONS="$SNARKOS_TAGS"
              fi
            fi
            
            # Get SDK versions
            if [ -n "${{ inputs.sdk_versions }}" ]; then
              SDK_VERSIONS="${{ inputs.sdk_versions }}"
            else
              SDK_TAGS=$(jq -r '.sdk.tags | join(",")' "$VERSIONS_FILE")
              SDK_BRANCHES=$(jq -r '.sdk.branches | join(",")' "$VERSIONS_FILE")
              INCLUDE_BRANCHES=$(jq -r '.include_branches // true' "$VERSIONS_FILE")
              
              if [ "$INCLUDE_BRANCHES" == "true" ] && [ -n "$SDK_BRANCHES" ]; then
                SDK_VERSIONS="${SDK_TAGS},${SDK_BRANCHES}"
              else
                SDK_VERSIONS="$SDK_TAGS"
              fi
            fi
            
            # Get DPS versions
            if [ -n "${{ inputs.dps_versions }}" ]; then
              DPS_VERSIONS="${{ inputs.dps_versions }}"
            else
              DPS_TAGS=$(jq -r '.dps.tags | join(",")' "$VERSIONS_FILE")
              DPS_BRANCHES=$(jq -r '.dps.branches | join(",")' "$VERSIONS_FILE")
              INCLUDE_BRANCHES=$(jq -r '.include_branches // true' "$VERSIONS_FILE")
              
              if [ "$INCLUDE_BRANCHES" == "true" ] && [ -n "$DPS_BRANCHES" ]; then
                DPS_VERSIONS="${DPS_TAGS},${DPS_BRANCHES}"
              else
                DPS_VERSIONS="$DPS_TAGS"
              fi
            fi
          fi
          
          # Convert to JSON arrays
          SNARKOS_ARRAY=$(echo "$SNARKOS_VERSIONS" | tr ',' '\n' | grep -v '^$' | jq -R . | jq -s .)
          SDK_ARRAY=$(echo "$SDK_VERSIONS" | tr ',' '\n' | grep -v '^$' | jq -R . | jq -s .)
          DPS_ARRAY=$(echo "$DPS_VERSIONS" | tr ',' '\n' | grep -v '^$' | jq -R . | jq -s .)
          
          # Create matrix JSON (compact, single line for GITHUB_OUTPUT)
          MATRIX=$(jq -cn \
            --argjson snarkos "$SNARKOS_ARRAY" \
            --argjson sdk "$SDK_ARRAY" \
            --argjson dps "$DPS_ARRAY" \
            '{snarkos_version: $snarkos, sdk_version: $sdk, dps_version: $dps}')
          
          echo "Generated matrix:"
          echo "$MATRIX" | jq .
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # Build all snarkOS versions in parallel
  build-snarkos:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        snarkos_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).snarkos_version }}
    uses: ./.github/workflows/setup-snarkos.yml
    with:
      ref: ${{ matrix.snarkos_version }}
      artifact_suffix: -${{ matrix.snarkos_version }}

  # Build all SDK versions in parallel
  build-sdk:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        sdk_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).sdk_version }}
    uses: ./.github/workflows/setup-sdk.yml
    with:
      ref: ${{ matrix.sdk_version }}
      artifact_suffix: -${{ matrix.sdk_version }}

  # Build all DPS versions in parallel
  build-dps:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        dps_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).dps_version }}
    uses: ./.github/workflows/setup-dps.yml
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
    with:
      ref: ${{ matrix.dps_version }}
      artifact_suffix: -${{ matrix.dps_version }}

  # Test all combinations
  test-compatibility:
    needs: [generate-matrix, build-snarkos, build-sdk, build-dps]
    runs-on: ubuntu-latest-l
    strategy:
      fail-fast: false
      matrix:
        snarkos_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).snarkos_version }}
        sdk_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).sdk_version }}
        dps_version: ${{ fromJson(needs.generate-matrix.outputs.matrix).dps_version }}
    steps:
      - name: Checkout integration test repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download snarkOS binary
        uses: actions/download-artifact@v5
        with:
          name: snarkos-build-${{ matrix.snarkos_version }}
          path: local_build/snarkOS

      - name: Download SDK build
        uses: actions/download-artifact@v5
        with:
          name: sdk-build-${{ matrix.sdk_version }}
          path: local_build/sdk

      - name: Download DPS binary
        uses: actions/download-artifact@v5
        with:
          name: dps-build-${{ matrix.dps_version }}
          path: local_build/dps

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup snarkOS binary
        run: |
          # Handle both old and new artifact structures
          if [ -f "local_build/snarkOS/snarkos" ]; then
            SNARKOS_BIN="local_build/snarkOS/snarkos"
          else
            SNARKOS_BIN="local_build/snarkOS/target/release/snarkos"
          fi
          chmod +x "$SNARKOS_BIN"
          "$SNARKOS_BIN" --version || true
          echo "SNARKOS_BINARY_PATH=${PWD}/${SNARKOS_BIN}" >> $GITHUB_ENV

      - name: Setup DPS binary
        run: |
          # Handle artifact structure - file should be at local_build/dps/prover
          if [ -f "local_build/dps/prover" ]; then
            DPS_BIN="local_build/dps/prover"
          else
            # Try to find it anywhere in the directory
            DPS_BIN=$(find local_build/dps -name "prover" -type f | head -1)
            if [ -z "$DPS_BIN" ]; then
              echo "Error: DPS binary (prover) not found in artifact" >&2
              exit 1
            fi
          fi
          chmod +x "$DPS_BIN"
          "$DPS_BIN" --version || true
          echo "DPS_BINARY_PATH=${PWD}/${DPS_BIN}" >> $GITHUB_ENV

      - name: Prepare SDK packages for integration tests
        run: |
          # Handle both old and new artifact structures
          if [ -f "local_build/sdk/sdk-local.tgz" ]; then
            SDK_TARBALL="${PWD}/local_build/sdk/sdk-local.tgz"
          else
            SDK_TARBALL="${PWD}/local_build/sdk/sdk-build-cache/sdk-local.tgz"
          fi
          echo "Using pre-built SDK tarball: $SDK_TARBALL"
          
          SDK_LOCAL_VERSION=$(tar -xzf "$SDK_TARBALL" -O package/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")
          echo "SDK version: $SDK_LOCAL_VERSION"
          
          for testDir in tests/integration/*/; do
            if [ -f "$testDir/package.json" ]; then
              relPath=$(realpath --relative-to="$testDir" "$SDK_TARBALL")
              node -e "
                const fs = require('fs');
                const pkgPath = '$testDir/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                pkg.dependencies['@provablehq/sdk'] = 'file:$relPath';
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Updated: $testDir/package.json"
            fi
          done
          
          echo "SDK_TARBALL=$SDK_TARBALL" >> $GITHUB_ENV
          echo "SDK_LOCAL_VERSION=$SDK_LOCAL_VERSION" >> $GITHUB_ENV

      - name: Start snarkOS devnet
        run: |
          chmod +x tests/setup/start-devnet.sh
          ./tests/setup/start-devnet.sh

      - name: Wait for devnet readiness
        run: |
          chmod +x tests/setup/wait-for-devnet.sh
          ./tests/setup/wait-for-devnet.sh

      - name: Start DPS service
        run: |
          chmod +x tests/setup/start-dps.sh
          ./tests/setup/start-dps.sh

      - name: Run integration tests
        id: tests
        run: |
          chmod +x tests/run-all-tests.sh
          ./tests/run-all-tests.sh --dev --skip-build && echo "result=pass" >> $GITHUB_OUTPUT || echo "result=fail" >> $GITHUB_OUTPUT

      - name: Stop DPS service
        if: always()
        run: |
          chmod +x tests/setup/stop-dps.sh
          ./tests/setup/stop-dps.sh || true

      - name: Stop snarkOS devnet
        if: always()
        run: |
          chmod +x tests/setup/stop-devnet.sh
          ./tests/setup/stop-devnet.sh || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report-snarkos-${{ matrix.snarkos_version }}-sdk-${{ matrix.sdk_version }}-dps-${{ matrix.dps_version }}
          path: test-results/
          retention-days: 7

      - name: Save result
        if: always()
        run: |
          mkdir -p compatibility-results
          echo '{
            "snarkos_version": "${{ matrix.snarkos_version }}",
            "sdk_version": "${{ matrix.sdk_version }}",
            "dps_version": "${{ matrix.dps_version }}",
            "result": "${{ steps.tests.outputs.result || 'error' }}",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' > compatibility-results/result-${{ matrix.snarkos_version }}-${{ matrix.sdk_version }}-${{ matrix.dps_version }}.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compat-result-snarkos-${{ matrix.snarkos_version }}-sdk-${{ matrix.sdk_version }}-dps-${{ matrix.dps_version }}
          path: compatibility-results/
          retention-days: 7

  # Aggregate results and update matrix.json
  aggregate-results:
    needs: [generate-matrix, test-compatibility]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download all result artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: compat-result-*
          path: all-results
          merge-multiple: true

      - name: Aggregate results into matrix.json
        run: |
          # Read existing matrix or create new one
          MATRIX_FILE="compatibility/matrix.json"
          
          if [ -f "$MATRIX_FILE" ]; then
            EXISTING=$(cat "$MATRIX_FILE")
          else
            EXISTING='{"last_updated": null, "results": []}'
          fi
          
          # Collect all new results
          NEW_RESULTS="[]"
          for result_file in all-results/*.json; do
            if [ -f "$result_file" ]; then
              NEW_RESULTS=$(echo "$NEW_RESULTS" | jq --slurpfile new "$result_file" '. + $new')
            fi
          done
          
          # Merge with existing results (update existing, add new)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MERGED=$(echo "$EXISTING" | jq --argjson new "$NEW_RESULTS" --arg ts "$TIMESTAMP" '
            .last_updated = $ts |
            .results = (
              # Remove old entries that match new ones
              [.results[] | select(
                . as $old |
                ($new | map(select(.snarkos_version == $old.snarkos_version and .sdk_version == $old.sdk_version and .dps_version == $old.dps_version)) | length) == 0
              )] +
              # Add all new entries
              $new
            ) |
            # Sort by versions
            .results |= sort_by([.snarkos_version, .sdk_version, .dps_version])
          ')
          
          echo "$MERGED" | jq . > "$MATRIX_FILE"
          
          echo "Updated matrix.json:"
          cat "$MATRIX_FILE"

      - name: Commit updated matrix
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add compatibility/matrix.json
            git diff --staged --quiet || git commit -m "Update compatibility matrix [skip ci]"
            
            # Retry push with pull --rebase to handle concurrent updates
            PUSH_SUCCESS=false
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Push succeeded"
                PUSH_SUCCESS=true
                break
              fi
              echo "Push failed, attempt $i/5 - pulling and retrying..."
              git pull --rebase origin ${{ github.ref_name }}
              sleep $((i * 2))
            done
  
            if [ "$PUSH_SUCCESS" = "false" ]; then
              echo "❌ Failed to push changes after 5 attempts"
              exit 1
            fi
          else
            echo "Skipping commit/push on pull request"
          fi

      - name: Generate GitHub summary
        run: |
          echo "## Compatibility Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| snarkOS | SDK | DPS | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          jq -r '.results[] | "| \(.snarkos_version) | \(.sdk_version) | \(.dps_version) | \(if .result == "pass" then "✅" elif .result == "fail" then "❌" else "⚠️" end) |"' compatibility/matrix.json >> $GITHUB_STEP_SUMMARY

  # Deploy dashboard to Cloudflare Pages
  # Note: Skipped on PRs because secrets are not available for fork PRs
  deploy-dashboard:
    needs: aggregate-results
    if: always() && needs.aggregate-results.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }} || true

      - name: Prepare dashboard
        run: |
          mkdir -p dashboard-dist
          cp compatibility/dashboard/* dashboard-dist/
          cp compatibility/matrix.json dashboard-dist/
          cp compatibility/versions.json dashboard-dist/
          echo "Dashboard prepared for deployment"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: e2e-testing-reports
          directory: dashboard-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v5
        with:
          name: compatibility-dashboard
          path: dashboard-dist/
          retention-days: 30



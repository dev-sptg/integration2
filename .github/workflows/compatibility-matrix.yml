name: Compatibility Matrix

on:
  schedule:
    - cron: '13 2 * * *'  # Run nightly at 02:13 UTC to avoid crowded timeslots
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      test_latest_only:
        description: 'Test only latest versions (skip older tags)'
        required: false
        type: boolean
        default: false
      snarkos:
        description: 'snarkOS version (tag, branch, or commit SHA, e.g., "v4.4.0", "mainnet", "a1b2c3d")'
        required: false
        type: string
        default: ''
      sdk:
        description: 'SDK version (tag, branch, or commit SHA)'
        required: false
        type: string
        default: ''
      dps:
        description: 'DPS version (tag, branch, or commit SHA, optional)'
        required: false
        type: string
        default: ''
      rerun_existing:
        description: 'Re-run tests even if results already exist'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      test_latest_only:
        description: 'Test only latest versions (skip older tags)'
        required: false
        type: boolean
        default: false
      snarkos:
        description: 'snarkOS version (tag, branch, or commit SHA)'
        required: false
        type: string
        default: ''
      sdk:
        description: 'SDK version (tag, branch, or commit SHA)'
        required: false
        type: string
        default: ''
      dps:
        description: 'DPS version (tag, branch, or commit SHA, optional)'
        required: false
        type: string
        default: ''
      rerun_existing:
        description: 'Re-run tests even if results already exist'
        required: false
        type: boolean
        default: false

concurrency:
  group: compatibility-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Generate the version matrix from versions.json or inputs
  generate-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      snarkos_versions: ${{ steps.set-matrix.outputs.snarkos_versions }}
      sdk_versions: ${{ steps.set-matrix.outputs.sdk_versions }}
      dps_versions: ${{ steps.set-matrix.outputs.dps_versions }}
      test_matrix: ${{ steps.set-matrix.outputs.test_matrix }}
      run_matrix: ${{ steps.set-matrix.outputs.run_matrix }}
      report_id: ${{ steps.set-matrix.outputs.report_id }}
      metadata_json: ${{ steps.set-matrix.outputs.metadata_json }}
      standalone_mode: ${{ steps.set-matrix.outputs.standalone_mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate version matrix
        id: set-matrix
        env:
          # Use a PAT (if available) for private repos like DPS; fall back to GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN != '' && secrets.MY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Helper function to detect if input is a commit SHA
          is_commit_sha() {
            echo "$1" | grep -qE '^[a-fA-F0-9]{7,40}$'
          }

          build_include_matrix() {
            local matrix_json="$1"
            echo "$matrix_json" | jq -c '
              to_entries as $entries
              | reduce $entries[] as $e ([{}];
                  [ .[] as $obj | $e.value[] as $v | $obj + {($e.key): $v} ]
                )
            '
          }

          emit_matrix_outputs() {
            local matrix_json="$1"
            local matrix_compact
            local all_combos
            local missing_combos
            local run_matrix="true"
            local version_keys
            local existing_combos="[]"
            local total_count
            local existing_count
            local missing_count
            local snarkos_versions
            local sdk_versions
            local dps_versions
            local test_matrix

            matrix_compact=$(echo "$matrix_json" | jq -c .)
            all_combos=$(build_include_matrix "$matrix_json")
            missing_combos="$all_combos"
            version_keys=$(echo "$matrix_json" | jq -c 'keys')

            if [ "$DEDUP_MODE" == "true" ]; then
              if [ -f "$MATRIX_FILE" ]; then
                if ! existing_combos=$(jq -c --argjson keys "$version_keys" '
                  (.results // [])
                  | if type == "array" then . else [] end
                  | map(select(type == "object"))
                  | map(select(. as $obj | $keys | all(. as $k | $obj[$k] != null and $obj[$k] != "" and $obj[$k] != "null")))
                  | map(with_entries(select(.key as $k | $keys | index($k))))
                  | unique
                ' "$MATRIX_FILE"); then
                  echo "Warning: failed to parse matrix.json results, skipping dedup."
                  existing_combos="[]"
                fi
              fi

              missing_combos=$(echo "$all_combos" | jq -c --argjson existing "$existing_combos" '[ .[] | select($existing | index(.) | not) ]')
              total_count=$(echo "$all_combos" | jq 'length')
              existing_count=$(echo "$existing_combos" | jq 'length')
              missing_count=$(echo "$missing_combos" | jq 'length')
              echo "Schedule filtering: total=$total_count existing=$existing_count missing=$missing_count"
              if [ "$missing_count" -eq 0 ]; then
                run_matrix="false"
              fi
            fi

            if [ "$PR_RUN_TESTS" == "false" ]; then
              run_matrix="false"
            fi

            snarkos_versions=$(echo "$missing_combos" | jq -c '[.[].snarkos_version] | map(select(. != null and . != "" and . != "null")) | unique')
            sdk_versions=$(echo "$missing_combos" | jq -c '[.[].sdk_version] | map(select(. != null and . != "" and . != "null")) | unique')
            dps_versions=$(echo "$missing_combos" | jq -c '[.[].dps_version] | map(select(. != null and . != "" and . != "null")) | unique')
            test_matrix=$(echo "$missing_combos" | jq -c '{include: .}')

            echo "matrix=$matrix_compact" >> $GITHUB_OUTPUT
            echo "snarkos_versions=$snarkos_versions" >> $GITHUB_OUTPUT
            echo "sdk_versions=$sdk_versions" >> $GITHUB_OUTPUT
            echo "dps_versions=$dps_versions" >> $GITHUB_OUTPUT
            echo "test_matrix=$test_matrix" >> $GITHUB_OUTPUT
            echo "run_matrix=$run_matrix" >> $GITHUB_OUTPUT
          }

          # Read versions config for repo URLs
          VERSIONS_FILE="compatibility/versions.json"
          MATRIX_FILE="compatibility/matrix.json"

          # Get unified inputs
          SNARKOS_INPUT="${{ inputs.snarkos }}"
          SDK_INPUT="${{ inputs.sdk }}"
          DPS_INPUT="${{ inputs.dps }}"

          # Determine if PR changes require running tests
          PR_RUN_TESTS="true"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_RUN_TESTS="false"
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
              if ! git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"; then
                echo "Warning: failed to fetch PR SHAs, running tests to be safe."
                PR_RUN_TESTS="true"
              else
                CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
                if echo "$CHANGED_FILES" | grep -Eq '^(compatibility/matrix\.json|tests/)'; then
                  PR_RUN_TESTS="true"
                fi
              fi
            else
              PR_RUN_TESTS="true"
            fi
            echo "PR run tests: $PR_RUN_TESTS"
          fi

          # Determine when to deduplicate existing results
          DEDUP_MODE="false"
          if [ "${{ github.event_name }}" == "schedule" ]; then
            DEDUP_MODE="true"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "workflow_call" ]; then
            if [ "${{ inputs.rerun_existing }}" != "true" ]; then
              DEDUP_MODE="true"
            fi
          fi
          echo "Dedup mode: $DEDUP_MODE (event=${{ github.event_name }})"

          # Auto-detect mode: if ANY input looks like a commit SHA, use standalone mode
          STANDALONE_MODE="false"
          if [ -n "$SNARKOS_INPUT" ] && is_commit_sha "$SNARKOS_INPUT"; then
            STANDALONE_MODE="true"
          elif [ -n "$SDK_INPUT" ] && is_commit_sha "$SDK_INPUT"; then
            STANDALONE_MODE="true"
          elif [ -n "$DPS_INPUT" ] && is_commit_sha "$DPS_INPUT"; then
            STANDALONE_MODE="true"
          fi

          # Check for standalone mode (on-demand testing with commit SHAs)
          if [ "$STANDALONE_MODE" == "true" ]; then
            echo "🔧 Running in standalone mode (on-demand testing)"

            # Generate report ID (timestamp only)
            REPORT_ID="$(date +%Y%m%d-%H%M%S)"
            echo "report_id=$REPORT_ID" >> $GITHUB_OUTPUT

            # Track components and metadata
            COMPONENTS=()
            METADATA_OBJ="{}"
            SNARKOS_REF=""
            SDK_REF=""
            DPS_REF=""

            # Process snarkOS input
            if [ -n "$SNARKOS_INPUT" ]; then
              if is_commit_sha "$SNARKOS_INPUT"; then
                # It's a commit SHA - validate it
              REPO=$(jq -r '.components.snarkos.repo' "$VERSIONS_FILE")
                echo "Validating snarkOS commit: $SNARKOS_INPUT"
                if RESULT=$(scripts/validate-commit-sha.sh "$REPO" "$SNARKOS_INPUT"); then
                SNARKOS_REF=$(echo "$RESULT" | jq -r '.sha')
                METADATA_OBJ=$(echo "$METADATA_OBJ" | jq --argjson m "$RESULT" '.snarkos = $m')
                COMPONENTS+=("snarkos")
                echo "✅ snarkOS: $SNARKOS_REF"
              else
                echo "❌ Invalid snarkOS commit"
                echo "$RESULT" | jq -r '.error'
                exit 1
              fi
            else
                # It's a tag/branch - use as-is
                SNARKOS_REF="$SNARKOS_INPUT"
                COMPONENTS+=("snarkos")
                echo "✅ snarkOS: $SNARKOS_REF (tag/branch)"
              fi
            fi

            # Process SDK input
            if [ -n "$SDK_INPUT" ]; then
              if is_commit_sha "$SDK_INPUT"; then
                # It's a commit SHA - validate it
              REPO=$(jq -r '.components.sdk.repo' "$VERSIONS_FILE")
                echo "Validating SDK commit: $SDK_INPUT"
                if RESULT=$(scripts/validate-commit-sha.sh "$REPO" "$SDK_INPUT"); then
                SDK_REF=$(echo "$RESULT" | jq -r '.sha')
                METADATA_OBJ=$(echo "$METADATA_OBJ" | jq --argjson m "$RESULT" '.sdk = $m')
                COMPONENTS+=("sdk")
                echo "✅ SDK: $SDK_REF"
              else
                echo "❌ Invalid SDK commit"
                echo "$RESULT" | jq -r '.error'
                exit 1
              fi
            else
                # It's a tag/branch - use as-is
                SDK_REF="$SDK_INPUT"
                COMPONENTS+=("sdk")
                echo "✅ SDK: $SDK_REF (tag/branch)"
              fi
            fi

            # Process DPS input
            if [ -n "$DPS_INPUT" ]; then
              if is_commit_sha "$DPS_INPUT"; then
                # It's a commit SHA - validate it
              REPO=$(jq -r '.components.dps.repo' "$VERSIONS_FILE")
                echo "Validating DPS commit: $DPS_INPUT"
                if RESULT=$(scripts/validate-commit-sha.sh "$REPO" "$DPS_INPUT"); then
                DPS_REF=$(echo "$RESULT" | jq -r '.sha')
                METADATA_OBJ=$(echo "$METADATA_OBJ" | jq --argjson m "$RESULT" '.dps = $m')
                COMPONENTS+=("dps")
                echo "✅ DPS: $DPS_REF"
              else
                echo "❌ Invalid DPS commit"
                echo "$RESULT" | jq -r '.error'
                exit 1
              fi
            else
                # It's a tag/branch - use as-is
                DPS_REF="$DPS_INPUT"
                COMPONENTS+=("dps")
                echo "✅ DPS: $DPS_REF (tag/branch)"
              fi
            fi

            # Check if we have at least one component
            COMPONENT_COUNT=${#COMPONENTS[@]}
            if [ $COMPONENT_COUNT -eq 0 ]; then
              echo "❌ Error: At least one component must be specified"
              exit 1
            fi

            # If only one component provided, fetch defaults from matrix.json
            if [ $COMPONENT_COUNT -eq 1 ]; then
              echo "📋 Only one component specified, fetching defaults from matrix.json..."
              
              if [ -f "$MATRIX_FILE" ]; then
                # Find the most recent passing result
                LATEST_PASS=$(jq -r '.results | map(select(.result == "pass")) | sort_by(.timestamp) | reverse | .[0]' "$MATRIX_FILE" 2>/dev/null || echo "null")
                
                if [ "$LATEST_PASS" != "null" ] && [ -n "$LATEST_PASS" ]; then
                  # Extract missing component versions
                  if [ -z "$SNARKOS_REF" ]; then
                    SNARKOS_REF=$(echo "$LATEST_PASS" | jq -r '.snarkos_version // empty')
                    if [ -n "$SNARKOS_REF" ]; then
                      COMPONENTS+=("snarkos")
                      echo "📌 Using snarkOS from matrix.json: $SNARKOS_REF"
                    fi
                  fi
                  
                  if [ -z "$SDK_REF" ]; then
                    SDK_REF=$(echo "$LATEST_PASS" | jq -r '.sdk_version // empty')
                    if [ -n "$SDK_REF" ]; then
                      COMPONENTS+=("sdk")
                      echo "📌 Using SDK from matrix.json: $SDK_REF"
                    fi
                  fi
                  
                  if [ -z "$DPS_REF" ]; then
                    DPS_REF=$(echo "$LATEST_PASS" | jq -r '.dps_version // empty')
                    if [ -n "$DPS_REF" ]; then
                      COMPONENTS+=("dps")
                      echo "📌 Using DPS from matrix.json: $DPS_REF"
                    fi
                  fi
                else
                  echo "⚠️ No passing results found in matrix.json, falling back to versions.json"
                  # Fallback to latest from versions.json
                  if [ -z "$SNARKOS_REF" ]; then
                    SNARKOS_REF=$(jq -r '.components.snarkos.tags[0] // empty' "$VERSIONS_FILE")
                    if [ -n "$SNARKOS_REF" ]; then
                      COMPONENTS+=("snarkos")
                      echo "📌 Using latest snarkOS from versions.json: $SNARKOS_REF"
                    fi
                  fi
                  if [ -z "$SDK_REF" ]; then
                    SDK_REF=$(jq -r '.components.sdk.tags[0] // empty' "$VERSIONS_FILE")
                    if [ -n "$SDK_REF" ]; then
                      COMPONENTS+=("sdk")
                      echo "📌 Using latest SDK from versions.json: $SDK_REF"
                    fi
                  fi
                  if [ -z "$DPS_REF" ]; then
                    DPS_REF=$(jq -r '.components.dps.tags[0] // empty' "$VERSIONS_FILE")
                    if [ -n "$DPS_REF" ]; then
                      COMPONENTS+=("dps")
                      echo "📌 Using latest DPS from versions.json: $DPS_REF"
                    fi
                  fi
                fi
              else
                echo "⚠️ matrix.json not found, falling back to versions.json"
                # Fallback to latest from versions.json
                if [ -z "$SNARKOS_REF" ]; then
                  SNARKOS_REF=$(jq -r '.components.snarkos.tags[0] // empty' "$VERSIONS_FILE")
                  if [ -n "$SNARKOS_REF" ]; then
                    COMPONENTS+=("snarkos")
                    echo "📌 Using latest snarkOS from versions.json: $SNARKOS_REF"
                  fi
                fi
                if [ -z "$SDK_REF" ]; then
                  SDK_REF=$(jq -r '.components.sdk.tags[0] // empty' "$VERSIONS_FILE")
                  if [ -n "$SDK_REF" ]; then
                    COMPONENTS+=("sdk")
                    echo "📌 Using latest SDK from versions.json: $SDK_REF"
                  fi
                fi
                if [ -z "$DPS_REF" ]; then
                  DPS_REF=$(jq -r '.components.dps.tags[0] // empty' "$VERSIONS_FILE")
                  if [ -n "$DPS_REF" ]; then
                    COMPONENTS+=("dps")
                    echo "📌 Using latest DPS from versions.json: $DPS_REF"
                  fi
                fi
              fi
            fi

            # Validate at least 2 components after fallback
            COMPONENT_COUNT=${#COMPONENTS[@]}
            if [ $COMPONENT_COUNT -lt 2 ]; then
              echo "❌ Error: At least two components must be specified (after fallback: $COMPONENT_COUNT)"
              exit 1
            fi

            # Save metadata as output
            echo "metadata_json=$(echo "$METADATA_OBJ" | jq -c .)" >> $GITHUB_OUTPUT

            # Build simple matrix for standalone mode
            MATRIX_OBJ="{}"
            if [ -n "$SNARKOS_REF" ]; then
              MATRIX_OBJ=$(echo "$MATRIX_OBJ" | jq --arg v "$SNARKOS_REF" '. + {snarkos_version: [$v]}')
            fi
            if [ -n "$SDK_REF" ]; then
              MATRIX_OBJ=$(echo "$MATRIX_OBJ" | jq --arg v "$SDK_REF" '. + {sdk_version: [$v]}')
            fi
            if [ -n "$DPS_REF" ]; then
              MATRIX_OBJ=$(echo "$MATRIX_OBJ" | jq --arg v "$DPS_REF" '. + {dps_version: [$v]}')
            fi

            echo "Generated matrix for standalone mode:"
            echo "$MATRIX_OBJ" | jq .

            emit_matrix_outputs "$MATRIX_OBJ"
            echo "standalone_mode=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Original matrix generation logic for non-standalone mode
          echo "🔄 Running in matrix mode (scheduled/PR testing)"

          fetch_latest_versions() {
            local repo="$1"
            local limit="$2"
            local owner="${repo%/*}"
            local name="${repo#*/}"
            local query='query($owner:String!, $name:String!, $limit:Int!) { repository(owner:$owner, name:$name) { refs(refPrefix:"refs/tags/", first:$limit, orderBy:{field: TAG_COMMIT_DATE, direction: DESC}) { nodes { name } } } }'
            local tags=""

            if tags=$(gh api "repos/$repo/releases?per_page=100" --jq "[.[] | select(.draft == false) | .tag_name][0:$limit] | .[]" 2>/dev/null | tr '\n' ',' | sed 's/,$//'); then
              if [ -n "$tags" ]; then
                echo "$tags"
                return 0
              fi
            fi

            echo "WARNING: Release fetch failed for $repo, falling back to tags" >&2
            if tags=$(gh api graphql -f query="$query" -f owner="$owner" -f name="$name" -F limit="$limit" --jq '.data.repository.refs.nodes[].name' 2>/dev/null | tr '\n' ',' | sed 's/,$//'); then
              if [ -n "$tags" ]; then
                echo "$tags"
                return 0
              fi
            fi

            echo "WARNING: GraphQL tag fetch failed for $repo, falling back to REST" >&2
            tags=$(gh api "repos/$repo/tags?per_page=$limit" --jq ".[0:$limit] | .[].name" | tr '\n' ',' | sed 's/,$//')
            if [ -z "$tags" ]; then
              return 1
            fi

            echo "$tags"
          }

          # Read versions from config file
          VERSIONS_FILE="compatibility/versions.json"
          MATRIX_FILE="compatibility/matrix.json"
          
          # Determine if we should fetch latest versions (Schedule or Manual flag)
          SHOULD_FETCH="false"
          if [ "${{ github.event_name }}" == "schedule" ]; then
            SHOULD_FETCH="true"
          elif [ "${{ inputs.test_latest_only }}" == "true" ]; then
            SHOULD_FETCH="true"
          fi

          # Read component configuration
          TEST_LATEST_N=$(jq -r '.matrix_config.test_latest_n_tags // 3' "$VERSIONS_FILE")
          INCLUDE_BRANCHES=$(jq -r '.matrix_config.include_branches // false' "$VERSIONS_FILE")
            
            if [ "${{ inputs.test_latest_only }}" == "true" ]; then
              TEST_LATEST_N=1
            fi
            
          # Get list of components from config
          COMPONENT_KEYS=$(jq -r '.components | keys[]' "$VERSIONS_FILE")
          
          # Build matrix object dynamically
          MATRIX_OBJ="{}"
          
          for COMPONENT in $COMPONENT_KEYS; do
            COMPONENT_VERSIONS=""
            VERSION_KEY="${COMPONENT}_version"
            
            # Check for manual input override (handle known components explicitly)
            # For new components, add input parameters to workflow and handle here
            if [ "$COMPONENT" == "snarkos" ] && [ -n "${{ inputs.snarkos }}" ]; then
              COMPONENT_VERSIONS="${{ inputs.snarkos }}"
            elif [ "$COMPONENT" == "sdk" ] && [ -n "${{ inputs.sdk }}" ]; then
              COMPONENT_VERSIONS="${{ inputs.sdk }}"
            elif [ "$COMPONENT" == "dps" ] && [ -n "${{ inputs.dps }}" ]; then
              COMPONENT_VERSIONS="${{ inputs.dps }}"
            elif [ "$SHOULD_FETCH" == "true" ]; then
              # Fetch from GitHub API
              REPO=$(jq -r ".components[\"$COMPONENT\"].repo" "$VERSIONS_FILE")
              echo "Fetching $COMPONENT tags from $REPO..."
              
              if ! COMPONENT_TAGS=$(fetch_latest_versions "$REPO" "$TEST_LATEST_N"); then
                echo "❌ Failed to fetch $COMPONENT tags from GitHub API"
              exit 1
            fi
              if [ -z "$COMPONENT_TAGS" ]; then
                echo "❌ No $COMPONENT tags returned from GitHub API"
              exit 1
            fi
              echo "Found $COMPONENT tags: $COMPONENT_TAGS"
              
              # Update versions.json
              jq --arg comp "$COMPONENT" --arg tags "$COMPONENT_TAGS" \
                '.components[$comp].tags = ($tags | split(","))' \
                "$VERSIONS_FILE" > "${VERSIONS_FILE}.tmp" && mv "${VERSIONS_FILE}.tmp" "$VERSIONS_FILE"
              
              # Add branches if configured
              if [ "$INCLUDE_BRANCHES" == "true" ]; then
                COMPONENT_BRANCHES=$(jq -r ".components[\"$COMPONENT\"].branches | join(\",\")" "$VERSIONS_FILE")
                if [ -n "$COMPONENT_BRANCHES" ]; then
                  COMPONENT_TAGS="${COMPONENT_TAGS},${COMPONENT_BRANCHES}"
                fi
              fi
              
              COMPONENT_VERSIONS="$COMPONENT_TAGS"
            else
              # Read from config file
              COMPONENT_TAGS=$(jq -r ".components[\"$COMPONENT\"].tags | join(\",\")" "$VERSIONS_FILE")
              COMPONENT_BRANCHES=$(jq -r ".components[\"$COMPONENT\"].branches | join(\",\")" "$VERSIONS_FILE")
              
              if [ "$INCLUDE_BRANCHES" == "true" ] && [ -n "$COMPONENT_BRANCHES" ]; then
                COMPONENT_VERSIONS="${COMPONENT_TAGS},${COMPONENT_BRANCHES}"
              else
                COMPONENT_VERSIONS="$COMPONENT_TAGS"
              fi
            fi
            
            # Convert to JSON array and add to matrix object (use -c for compact output)
            COMPONENT_ARRAY=$(jq -nc --arg s "$COMPONENT_VERSIONS" '$s | split(",") | map(select(length > 0))')
            VERSION_KEY="${COMPONENT}_version"
            MATRIX_OBJ=$(echo "$MATRIX_OBJ" | jq -c --argjson arr "$COMPONENT_ARRAY" --arg key "$VERSION_KEY" ". + {(\$key): \$arr}")
          done
          
          # Commit updated versions.json if fetching
          if [ "$SHOULD_FETCH" == "true" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add "$VERSIONS_FILE"
              
              if ! git diff --staged --quiet; then
                git commit -m "Update versions.json with latest tags [skip ci]"
                
                # Robust push with retry
                PUSH_SUCCESS=false
                for i in 1 2 3 4 5; do
                  if git push; then
                    echo "✅ Push succeeded"
                    PUSH_SUCCESS=true
                    break
                  fi
                  echo "Push failed, attempt $i/5 - pulling and retrying..."
                  git config pull.rebase true
                  git pull --rebase --strategy-option theirs origin ${{ github.ref_name }}
                  sleep $((i * 2))
                done
                
                if [ "$PUSH_SUCCESS" = "false" ]; then
                  echo "❌ Failed to push changes after 5 attempts"
                  exit 1
                fi
                echo "✅ Updated and pushed versions.json"
              else
                echo "No changes to versions.json"
              fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "Skipping commit/push on pull request"
          fi
          
          # Output matrix
          echo "Generated matrix:"
          echo "$MATRIX_OBJ" | jq .

          emit_matrix_outputs "$MATRIX_OBJ"
          echo "standalone_mode=false" >> $GITHUB_OUTPUT

  # Build all snarkOS versions in parallel
  build-snarkos:
    needs: generate-matrix
    if: needs.generate-matrix.outputs.run_matrix == 'true'
    strategy:
      fail-fast: false
      matrix:
        snarkos_version: ${{ fromJson(needs.generate-matrix.outputs.snarkos_versions) }}
    uses: ./.github/workflows/setup-snarkos.yml
    with:
      ref: ${{ matrix.snarkos_version }}
      artifact_suffix: -${{ matrix.snarkos_version }}

  # Build all SDK versions in parallel
  build-sdk:
    needs: generate-matrix
    if: needs.generate-matrix.outputs.run_matrix == 'true'
    strategy:
      fail-fast: false
      matrix:
        sdk_version: ${{ fromJson(needs.generate-matrix.outputs.sdk_versions) }}
    uses: ./.github/workflows/setup-sdk.yml
    with:
      ref: ${{ matrix.sdk_version }}
      artifact_suffix: -${{ matrix.sdk_version }}

  # Build all DPS versions in parallel
  build-dps:
    needs: generate-matrix
    if: needs.generate-matrix.outputs.run_matrix == 'true'
    strategy:
      fail-fast: false
      matrix:
        dps_version: ${{ fromJson(needs.generate-matrix.outputs.dps_versions) }}
    uses: ./.github/workflows/setup-dps.yml
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
    with:
      ref: ${{ matrix.dps_version }}
      artifact_suffix: -${{ matrix.dps_version }}

  # Test all combinations
  test-compatibility:
    needs: [generate-matrix, build-snarkos, build-sdk, build-dps]
    if: needs.generate-matrix.outputs.run_matrix == 'true'
    runs-on: ubuntu-latest-l
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.test_matrix) }}
    steps:
      - name: Checkout integration test repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download snarkOS binary
        uses: actions/download-artifact@v5
        with:
          name: snarkos-build-${{ matrix.snarkos_version }}
          path: local_build/snarkOS

      - name: Download SDK build
        uses: actions/download-artifact@v5
        with:
          name: sdk-build-${{ matrix.sdk_version }}
          path: local_build/sdk

      - name: Download DPS binary
        uses: actions/download-artifact@v5
        with:
          name: dps-build-${{ matrix.dps_version }}
          path: local_build/dps

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup snarkOS binary
        run: |
          # Handle both old and new artifact structures
          if [ -f "local_build/snarkOS/snarkos" ]; then
            SNARKOS_BIN="local_build/snarkOS/snarkos"
          else
            SNARKOS_BIN="local_build/snarkOS/target/release/snarkos"
          fi
          chmod +x "$SNARKOS_BIN"
          "$SNARKOS_BIN" --version || true
          echo "SNARKOS_BINARY_PATH=${PWD}/${SNARKOS_BIN}" >> $GITHUB_ENV

      - name: Setup DPS binary
        run: |
          # Handle artifact structure - file should be at local_build/dps/prover
          if [ -f "local_build/dps/prover" ]; then
            DPS_BIN="local_build/dps/prover"
          else
            # Try to find it anywhere in the directory
            DPS_BIN=$(find local_build/dps -name "prover" -type f | head -1)
            if [ -z "$DPS_BIN" ]; then
              echo "Error: DPS binary (prover) not found in artifact" >&2
              exit 1
            fi
          fi
          chmod +x "$DPS_BIN"
          "$DPS_BIN" --version || true
          echo "DPS_BINARY_PATH=${PWD}/${DPS_BIN}" >> $GITHUB_ENV

      - name: Prepare SDK packages for integration tests
        run: |
          # Handle both old and new artifact structures
          if [ -f "local_build/sdk/sdk-local.tgz" ]; then
            SDK_TARBALL="${PWD}/local_build/sdk/sdk-local.tgz"
          else
            SDK_TARBALL="${PWD}/local_build/sdk/sdk-build-cache/sdk-local.tgz"
          fi
          echo "Using pre-built SDK tarball: $SDK_TARBALL"
          
          SDK_LOCAL_VERSION=$(tar -xzf "$SDK_TARBALL" -O package/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")
          echo "SDK version: $SDK_LOCAL_VERSION"
          
          for testDir in tests/integration/*/; do
            if [ -f "$testDir/package.json" ]; then
              relPath=$(realpath --relative-to="$testDir" "$SDK_TARBALL")
              node -e "
                const fs = require('fs');
                const pkgPath = '$testDir/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                pkg.dependencies['@provablehq/sdk'] = 'file:$relPath';
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Updated: $testDir/package.json"
            fi
          done
          
          echo "SDK_TARBALL=$SDK_TARBALL" >> $GITHUB_ENV
          echo "SDK_LOCAL_VERSION=$SDK_LOCAL_VERSION" >> $GITHUB_ENV

      - name: Start snarkOS devnet
        run: |
          chmod +x tests/setup/start-devnet.sh
          ./tests/setup/start-devnet.sh

      - name: Wait for devnet readiness
        run: |
          chmod +x tests/setup/wait-for-devnet.sh
          ./tests/setup/wait-for-devnet.sh

      - name: Start DPS service
        run: |
          chmod +x tests/setup/start-dps.sh
          ./tests/setup/start-dps.sh

      - name: Wait for DPS readiness
        run: |
          chmod +x tests/setup/wait-for-dps.sh
          ./tests/setup/wait-for-dps.sh

      - name: Run integration tests
        id: tests
        run: |
          chmod +x tests/run-all-tests.sh
          ./tests/run-all-tests.sh --dev --skip-build && echo "result=pass" >> $GITHUB_OUTPUT || echo "result=fail" >> $GITHUB_OUTPUT

      - name: Check test result
        if: steps.tests.outputs.result == 'fail'
        run: |
          echo "❌ Tests failed!"
          exit 1

      - name: Stop DPS service
        if: always()
        run: |
          chmod +x tests/setup/stop-dps.sh
          ./tests/setup/stop-dps.sh || true

      - name: Stop snarkOS devnet
        if: always()
        run: |
          chmod +x tests/setup/stop-devnet.sh
          ./tests/setup/stop-devnet.sh || true

      - name: Collect service logs
        if: always()
        run: |
          mkdir -p service-logs
          
          # Collect snarkOS devnet logs
          if [ -d "/tmp/snarkos-devnet-logs" ]; then
            cp -r /tmp/snarkos-devnet-logs service-logs/snarkos-devnet-logs
            echo "✅ Collected snarkOS devnet logs"
          else
            echo "⚠️ No snarkOS devnet logs found"
          fi
          
          # Collect DPS logs
          if [ -d "/tmp/dps-logs" ]; then
            cp -r /tmp/dps-logs service-logs/dps-logs
            echo "✅ Collected DPS logs"
          else
            echo "⚠️ No DPS logs found"
          fi
          
          # Create a summary file
          echo "Service Logs Summary" > service-logs/README.md
          echo "===================" >> service-logs/README.md
          echo "" >> service-logs/README.md
          echo "Test Configuration:" >> service-logs/README.md
          echo "- snarkOS: ${{ matrix.snarkos_version }}" >> service-logs/README.md
          echo "- SDK: ${{ matrix.sdk_version }}" >> service-logs/README.md
          echo "- DPS: ${{ matrix.dps_version }}" >> service-logs/README.md
          echo "- Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> service-logs/README.md
          echo "" >> service-logs/README.md
          echo "Log Files:" >> service-logs/README.md
          find service-logs -type f -name "*.log" | while read log; do
            echo "- $(basename $log): $(wc -l < $log) lines" >> service-logs/README.md
          done

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: service-logs-snarkos-${{ matrix.snarkos_version }}-sdk-${{ matrix.sdk_version }}-dps-${{ matrix.dps_version }}
          path: service-logs/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report-snarkos-${{ matrix.snarkos_version }}-sdk-${{ matrix.sdk_version }}-dps-${{ matrix.dps_version }}
          path: test-results/
          retention-days: 7

      - name: Save result
        if: always()
        run: |
          mkdir -p compatibility-results
          
          # Extract test summary from test-report.json if it exists (includes subtests)
          TEST_SUMMARY=""
          if [ -f "test-results/test-report.json" ]; then
            TEST_SUMMARY=$(jq -c '.tests | map({name: .name, status: .status, duration: .duration, error: .error, subtests: .subtests})' test-results/test-report.json 2>/dev/null || echo "[]")
          fi
          
          # Build result JSON with all component versions from matrix
          # Only include versions that are actually set (not empty)
          RESULT_JSON=$(jq -n \
            --arg result "${{ steps.tests.outputs.result || 'error' }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg snarkos "${{ matrix.snarkos_version }}" \
            --arg sdk "${{ matrix.sdk_version }}" \
            --arg dps "${{ matrix.dps_version }}" \
            --argjson tests "${TEST_SUMMARY:-[]}" \
            '{
              snarkos_version: $snarkos,
              sdk_version: $sdk,
              result: $result,
              timestamp: $timestamp,
              tests: $tests
            } + (if $dps != "" and $dps != "null" then {dps_version: $dps} else {} end)')
          
          # Build filename from component versions (only include non-empty ones)
          FILENAME_PARTS="result-${{ matrix.snarkos_version }}-${{ matrix.sdk_version }}"
          if [ -n "${{ matrix.dps_version }}" ] && [ "${{ matrix.dps_version }}" != "null" ]; then
            FILENAME_PARTS="${FILENAME_PARTS}-${{ matrix.dps_version }}"
          fi
          FILENAME="${FILENAME_PARTS}.json"
          
          echo "$RESULT_JSON" | jq . > "compatibility-results/$FILENAME"
          echo "Saved result to compatibility-results/$FILENAME"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compat-result-${{ matrix.snarkos_version }}-${{ matrix.sdk_version }}-${{ matrix.dps_version }}
          path: compatibility-results/
          retention-days: 7

  # Aggregate results and update matrix.json
  aggregate-results:
    needs: [generate-matrix, test-compatibility]
    if: always() && (needs.generate-matrix.outputs.run_matrix == 'true' || needs.generate-matrix.outputs.standalone_mode == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download all result artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: compat-result-*
          path: all-results
          merge-multiple: true

      - name: Download service logs (standalone mode)
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          pattern: service-logs-*
          path: all-logs
          merge-multiple: true

      - name: Aggregate results into matrix.json (skip in standalone mode)
        if: needs.generate-matrix.outputs.standalone_mode != 'true'
        run: |
          # Read existing matrix or create new one
          MATRIX_FILE="compatibility/matrix.json"
          VERSIONS_FILE="compatibility/versions.json"

          if [ -f "$MATRIX_FILE" ]; then
            EXISTING=$(cat "$MATRIX_FILE")
          else
            EXISTING='{"last_updated": null, "results": []}'
          fi

          # Get component list from config
          COMPONENT_KEYS=$(jq -r '.components | keys[]' "$VERSIONS_FILE")

          # Collect all new results
          NEW_RESULTS="[]"
          for result_file in all-results/*.json; do
            if [ -f "$result_file" ]; then
              NEW_RESULTS=$(echo "$NEW_RESULTS" | jq --slurpfile new "$result_file" '. + $new')
            fi
          done

          # Build sort keys array for jq
          SORT_KEYS_ARRAY="[]"
          for COMPONENT in $COMPONENT_KEYS; do
            VERSION_KEY="${COMPONENT}_version"
            SORT_KEYS_ARRAY=$(echo "$SORT_KEYS_ARRAY" | jq --arg key "$VERSION_KEY" '. + [$key]')
          done

          # Merge with existing results (update existing, add new)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Merge: keep old results that have all versions and don't match new ones, then add new results
          JQ_FILTER='.last_updated = $ts | .results = ([.results[] | . as $old | if ($sort_keys | all(. as $key | $old[$key] != null and $old[$key] != "" and $old[$key] != "null")) then if ($new | map(. as $n | $sort_keys | all(. as $key | $old[$key] == $n[$key])) | any) then empty else $old end else empty end] + $new) | .results |= sort_by([$sort_keys[] as $key | .[$key]])'

          MERGED=$(echo "$EXISTING" | jq \
            --argjson new "$NEW_RESULTS" \
            --argjson sort_keys "$SORT_KEYS_ARRAY" \
            --arg ts "$TIMESTAMP" \
            "$JQ_FILTER")

          echo "$MERGED" | jq . > "$MATRIX_FILE"

          echo "Updated matrix.json:"
          cat "$MATRIX_FILE"

      - name: Commit updated matrix (skip in standalone mode)
        if: needs.generate-matrix.outputs.standalone_mode != 'true'
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add compatibility/matrix.json
            git diff --staged --quiet || git commit -m "Update compatibility matrix [skip ci]"

            # Retry push with pull --rebase to handle concurrent updates
            PUSH_SUCCESS=false
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Push succeeded"
                PUSH_SUCCESS=true
                break
              fi
              echo "Push failed, attempt $i/5 - pulling and retrying..."
              git config pull.rebase true
              git pull --rebase --strategy-option theirs origin ${{ github.ref_name }}
              sleep $((i * 2))
            done

            if [ "$PUSH_SUCCESS" = "false" ]; then
              echo "❌ Failed to push changes after 5 attempts"
              exit 1
            fi
          else
            echo "Skipping commit/push on pull request"
          fi

      - name: Generate GitHub summary (matrix mode)
        if: needs.generate-matrix.outputs.standalone_mode != 'true'
        run: |
          VERSIONS_FILE="compatibility/versions.json"
          MATRIX_FILE="compatibility/matrix.json"

          # Get component list and build header dynamically
          COMPONENT_KEYS=$(jq -r '.components | keys[]' "$VERSIONS_FILE")

          # Build header row
          HEADER_PARTS=""
          SEPARATOR_PARTS=""
          for COMPONENT in $COMPONENT_KEYS; do
            LABEL=$(jq -r ".components[\"$COMPONENT\"].label" "$VERSIONS_FILE")
            HEADER_PARTS="${HEADER_PARTS}| ${LABEL} "
            SEPARATOR_PARTS="${SEPARATOR_PARTS}|---"
          done
          HEADER="${HEADER_PARTS}| Result |"
          SEPARATOR="${SEPARATOR_PARTS}|--------|"
          
          echo "## Compatibility Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$HEADER" >> $GITHUB_STEP_SUMMARY
          echo "$SEPARATOR" >> $GITHUB_STEP_SUMMARY
          
          # Build jq expression to extract versions dynamically
          # Create array of version keys for each component
          VERSION_KEYS_ARRAY="[]"
          for COMPONENT in $COMPONENT_KEYS; do
            VERSION_KEY="${COMPONENT}_version"
            VERSION_KEYS_ARRAY=$(echo "$VERSION_KEYS_ARRAY" | jq --arg key "$VERSION_KEY" '. + [$key]')
          done
          
          # Generate table rows using jq
          # Handle null, empty, or missing values by showing "-"
          jq -r --argjson keys "$VERSION_KEYS_ARRAY" '.results[] | 
            "| " + 
            ([$keys[] as $k | (if .[$k] and .[$k] != "null" and .[$k] != "" then .[$k] else "-" end)] | join(" | ")) + 
            " | " + 
            (if .result == "pass" then "✅" elif .result == "fail" then "❌" else "⚠️" end) + 
            " |"
          ' "$MATRIX_FILE" >> $GITHUB_STEP_SUMMARY

      - name: Generate standalone report (standalone mode only)
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        run: |
          REPORT_ID="${{ needs.generate-matrix.outputs.report_id }}"

          # Read metadata from generate-matrix outputs
          METADATA='${{ needs.generate-matrix.outputs.metadata_json }}'

          # Read test results
          # Test files are named result-{snarkos}-{sdk}-{dps}.json
          RESULT_FILE=$(find all-results -name "result-*.json" -type f | head -1)
          if [ -n "$RESULT_FILE" ]; then
            RAW_RESULTS=$(cat "$RESULT_FILE")
          else
            RAW_RESULTS='{"error": "No test results found"}'
          fi

          # Transform test results to match expected format for renderResults
          # Expected: {snarkos_version, sdk_version, dps_version, result, tests, timestamp}
          # Raw has: {summary, duration, tests, timestamp}
          SNARKOS_VER=$(echo "$METADATA" | jq -r '.snarkos.sha // empty')
          SDK_VER=$(echo "$METADATA" | jq -r '.sdk.sha // empty')
          DPS_VER=$(echo "$METADATA" | jq -r '.dps.sha // empty')

          # Compute pass/fail from summary
          FAILED_COUNT=$(echo "$RAW_RESULTS" | jq -r '.summary.failed // 0')
          if [ "$FAILED_COUNT" -gt 0 ] 2>/dev/null; then
            RESULT_STATUS="fail"
          else
            RESULT_STATUS="pass"
          fi

          # Build transformed result with version fields
          TRANSFORMED_RESULT=$(jq -n \
            --arg snarkos "$SNARKOS_VER" \
            --arg sdk "$SDK_VER" \
            --arg dps "$DPS_VER" \
            --arg result "$RESULT_STATUS" \
            --argjson raw "$RAW_RESULTS" \
            '{
              snarkos_version: $snarkos,
              sdk_version: $sdk,
              result: $result,
              timestamp: $raw.timestamp,
              tests: $raw.tests
            } + (if $dps != "" then {dps_version: $dps} else {} end)')

          # Create combined data
          DATA=$(jq -n \
            --argjson metadata "$METADATA" \
            --argjson results "[$TRANSFORMED_RESULT]" \
            --arg report_id "$REPORT_ID" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              report_id: $report_id,
              timestamp: $timestamp,
              metadata: $metadata,
              results: $results
            }')

          # Generate standalone HTML
          scripts/generate-standalone-dashboard.sh "$DATA" "on-demand-report-${REPORT_ID}.html"

      - name: Upload standalone report (standalone mode only)
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: on-demand-report-${{ needs.generate-matrix.outputs.report_id }}
          path: on-demand-report-*.html
          retention-days: 30

      - name: Generate GitHub summary (standalone mode)
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        run: |
          REPORT_ID="${{ needs.generate-matrix.outputs.report_id }}"
          # Construct URL dynamically based on branch (replace / with - for Cloudflare Pages)
          BRANCHSlug="${{ github.ref_name }}"
          BRANCHSlug="${BRANCHSlug//\//-}"
          REPORT_URL="https://${BRANCHSlug}.e2e-testing-standalone.pages.dev/reports/${REPORT_ID}/"
          METADATA='${{ needs.generate-matrix.outputs.metadata_json }}'

          echo "## 🧪 On-Demand Compatibility Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 [View Full Report](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report ID:** \`${REPORT_ID}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add commit metadata
          if [ -n "$METADATA" ]; then
            echo "### 🔖 Component Versions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if echo "$METADATA" | jq -e '.snarkos' > /dev/null; then
              SNARKOS_SHA=$(echo "$METADATA" | jq -r '.snarkos.sha')
              SNARKOS_MSG=$(echo "$METADATA" | jq -r '.snarkos.message' | head -c 60)
              echo "- **snarkOS:** \`$SNARKOS_SHA\`" >> $GITHUB_STEP_SUMMARY
              echo "  - *${SNARKOS_MSG}...*" >> $GITHUB_STEP_SUMMARY
            fi

            if echo "$METADATA" | jq -e '.sdk' > /dev/null; then
              SDK_SHA=$(echo "$METADATA" | jq -r '.sdk.sha')
              SDK_MSG=$(echo "$METADATA" | jq -r '.sdk.message' | head -c 60)
              echo "- **SDK:** \`$SDK_SHA\`" >> $GITHUB_STEP_SUMMARY
              echo "  - *${SDK_MSG}...*" >> $GITHUB_STEP_SUMMARY
            fi

            if echo "$METADATA" | jq -e '.dps' > /dev/null; then
              DPS_SHA=$(echo "$METADATA" | jq -r '.dps.sha')
              DPS_MSG=$(echo "$METADATA" | jq -r '.dps.message' | head -c 60)
              echo "- **DPS:** \`$DPS_SHA\`" >> $GITHUB_STEP_SUMMARY
              echo "  - *${DPS_MSG}...*" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Add test results summary
          if [ -f "all-results/result.json" ]; then
            RESULT=$(cat all-results/result.json)
            RESULT_STATUS=$(echo "$RESULT" | jq -r '.result')
            TESTS=$(echo "$RESULT" | jq -r '.tests // []')
            TOTAL_TESTS=$(echo "$TESTS" | jq 'length')
            PASSED_TESTS=$(echo "$TESTS" | jq '[.[] | select(.status == "passed")] | length')
            FAILED_TESTS=$(echo "$TESTS" | jq '[.[] | select(.status == "failed")] | length')

            echo "### 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$RESULT_STATUS" = "pass" ]; then
              echo "### ✅ Overall Result: **PASSED**" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Overall Result: **FAILED**" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | ${TOTAL_TESTS} |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | ${PASSED_TESTS} |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | ${FAILED_TESTS} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Add test details
            if [ "$TESTS" != "[]" ]; then
              echo "### 📋 Test Details" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Test | Status | Duration |" >> $GITHUB_STEP_SUMMARY
              echo "|------|--------|----------|" >> $GITHUB_STEP_SUMMARY
              echo "$TESTS" | jq -r '.[] | "| `\(.name)` | " + (if .status == "passed" then "✅ Passed" elif .status == "failed" then "❌ Failed" else "⚠️ Skipped" end) + " | \(.duration // "-") |"' >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download Full Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The detailed HTML report is also available as a workflow artifact." >> $GITHUB_STEP_SUMMARY
          echo "Scroll down to the **Artifacts** section to download \`on-demand-report-${REPORT_ID}.html\`" >> $GITHUB_STEP_SUMMARY

      - name: Prepare standalone report for Cloudflare Pages
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        run: |
          REPORT_ID="${{ needs.generate-matrix.outputs.report_id }}"

          # Create directory structure for Cloudflare Pages
          # This creates: reports/{report_id}/index.html
          mkdir -p reports-dist/reports/$REPORT_ID

          # Copy the standalone report as index.html
          cp on-demand-report-${REPORT_ID}.html reports-dist/reports/$REPORT_ID/index.html

          # Copy a redirect page to root (optional, for convenience)
          cat > reports-dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=/reports/" />
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="/reports/">reports</a>...</p>
          </body>
          </html>
          EOF

          # Create a reports listing page that redirects to the latest report
          cat > reports-dist/reports/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/$REPORT_ID/" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirecting to latest report...</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #0a0a0f; color: #e8e8f0; text-align: center; }
              a { color: #00d4ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .spinner { border: 3px solid #2a2a3a; border-top: 3px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
              @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            </style>
          </head>
          <body>
            <div class="spinner"></div>
            <p>Redirecting to latest report: <code>$REPORT_ID</code></p>
            <p><a href="/$REPORT_ID/">Click here if not redirected</a></p>
          </body>
          </html>
          EOF

          echo "✅ Prepared Cloudflare Pages deployment structure"

      - name: Deploy standalone report to Cloudflare Pages
        id: deploy
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy reports-dist --project-name=e2e-testing-standalone

      - name: Update GitHub summary with report URL
        if: needs.generate-matrix.outputs.standalone_mode == 'true'
        run: |
          REPORT_ID="${{ needs.generate-matrix.outputs.report_id }}"
          # Use the deployment alias URL (branch-specific) from wrangler output, fallback to construct it
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          if [ -n "$DEPLOYMENT_URL" ]; then
            # wrangler returns the deployment URL (e.g., https://feat-on-demand.e2e-testing-standalone.pages.dev)
            REPORT_URL="${DEPLOYMENT_URL}/reports/${REPORT_ID}/"
          else
            # Fallback: construct from project name and current branch (replace / with -)
            BRANCHSlug="${{ github.ref_name }}"
            BRANCHSlug="${BRANCHSlug//\//-}"
            REPORT_URL="https://${BRANCHSlug}.e2e-testing-standalone.pages.dev/reports/${REPORT_ID}/"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Published Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report URL:** [${REPORT_URL}](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The report has been published and is accessible at the URL above." >> $GITHUB_STEP_SUMMARY

      - name: Prepare dashboard for download
        if: needs.generate-matrix.outputs.standalone_mode != 'true'
        run: |
          mkdir -p dashboard-dist
          cp compatibility/dashboard/* dashboard-dist/
          cp compatibility/matrix.json dashboard-dist/
          cp compatibility/versions.json dashboard-dist/
          echo "Dashboard prepared for download"

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v5
        with:
          name: compatibility-dashboard
          path: dashboard-dist/
          retention-days: 30

  # Deploy dashboard to Cloudflare Pages
  # Note: Skipped on PRs because secrets are not available for fork PRs
  # Also skipped in standalone mode (on-demand tests generate their own report)
  deploy-dashboard:
    needs: aggregate-results
    if: always() && needs.aggregate-results.result == 'success' && github.event_name != 'pull_request' && needs.generate-matrix.outputs.standalone_mode != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }} || true

      - name: Prepare dashboard
        run: |
          mkdir -p dashboard-dist
          cp compatibility/dashboard/* dashboard-dist/
          cp compatibility/matrix.json dashboard-dist/
          cp compatibility/versions.json dashboard-dist/
          echo "Dashboard prepared for deployment"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: e2e-testing-reports
          directory: dashboard-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}



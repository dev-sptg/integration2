name: leo-playground-test

on: workflow_dispatch

env:
  PROJECT_DIR: tests/leo-playground

jobs:
  test-staging:
    name: Test Staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ${{ env.PROJECT_DIR }}/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run staging tests
        run: yarn test -- --retries=0 --trace=off

      - name: Upload Playwright report (staging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: ${{ env.PROJECT_DIR }}/playwright-report/
          retention-days: 14

  test-production:
    name: Test Production
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ${{ env.PROJECT_DIR }}/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run production tests
        run: yarn test

      - name: Upload Playwright report (production)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production
          path: ${{ env.PROJECT_DIR }}/playwright-report/
          retention-days: 14

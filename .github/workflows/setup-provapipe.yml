name: Setup Provapipe

on:
  workflow_call:
    secrets:
      REPO_ACCESS_TOKEN:
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest-m
    steps:
      - name: Checkout Provapipe repository
        uses: actions/checkout@v5
        with:
          repository: ProvableHQ/Provapipe
          path: provapipe
          fetch-depth: 1
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: provapipe
          shared-key: provapipe-cache
          save-if: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsasl2-dev

      - name: Install Provapipe dependencies
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cd provapipe
          cargo build --release

      - name: Upload Provapipe repository
        uses: actions/upload-artifact@v4
        with:
          name: provapipe-build
          path: provapipe
          retention-days: 1
          include-hidden-files: true


name: Integration Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snarkos-build:
    uses: ./.github/workflows/setup-snarkos.yml

  sdk-build:
    uses: ./.github/workflows/setup-sdk.yml

  integration-tests:
    needs: [snarkos-build, sdk-build]
    runs-on: ubuntu-latest-m
    steps:
      - name: Checkout integration test repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download snarkOS build
        uses: actions/download-artifact@v4
        with:
          name: snarkos-build
          path: local_build/snarkOS

      - name: Download SDK build
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: local_build/sdk

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Fix permissions in local_build
        run: |
          # Make all binaries in node_modules/.bin executable
          find local_build -type f -path "*/node_modules/.bin/*" -exec chmod +x {} \;
          # Make snarkOS binary executable
          if [ -f local_build/snarkOS/target/release/snarkos ]; then
            chmod +x local_build/snarkOS/target/release/snarkos
            local_build/snarkOS/target/release/snarkos --version
          fi
          # Make any shell scripts executable
          find local_build -type f -name "*.sh" -exec chmod +x {} \;

      - name: Prepare SDK packages for integration tests
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          chmod +x tests/setup/install-packages.sh
          export INTEGRATION_ROOT="${PWD}"
          source tests/setup/install-packages.sh

      - name: Start snarkOS devnet
        run: |
          chmod +x tests/setup/start-devnet.sh
          ./tests/setup/start-devnet.sh

      - name: Wait for devnet readiness
        run: |
          chmod +x tests/setup/wait-for-devnet.sh
          ./tests/setup/wait-for-devnet.sh

      - name: Run integration tests
        run: |
          chmod +x tests/run-all-tests.sh
          # Use --dev flag since devnet is managed separately in CI
          # Use --skip-build flag since we downloaded artifacts
          ./tests/run-all-tests.sh --dev --skip-build || true

      - name: Stop snarkOS devnet
        if: always()
        run: |
          chmod +x tests/setup/stop-devnet.sh
          ./tests/setup/stop-devnet.sh || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: test-results/test-report.json
          retention-days: 7

      - name: Post test summary
        if: always()
        run: |
          if [ -f test-results/github-summary.md ]; then
            echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
            cat test-results/github-summary.md >> $GITHUB_STEP_SUMMARY
          fi


name: Integration Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snarkos-build:
    uses: ./.github/workflows/setup-snarkos.yml

  record-scanning-service-build:
    uses: ./.github/workflows/setup-record-scanning-service.yml
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      DEPENDENCY_CUSNARK_SSH_KEY: ${{ secrets.DEPENDENCY_CUSNARK_SSH_KEY }}

  provapipe-build:
    uses: ./.github/workflows/setup-provapipe.yml
    secrets:
      REPO_ACCESS_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

  sdk-build:
    uses: ./.github/workflows/setup-sdk.yml

  integration-tests:
    needs: [snarkos-build, record-scanning-service-build, provapipe-build, sdk-build]
    runs-on: ubuntu-latest-m
    steps:
      - name: Checkout integration test repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download snarkOS build
        uses: actions/download-artifact@v4
        with:
          name: snarkos-build
          path: snarkOS

      - name: Download Record Scanning Service build
        uses: actions/download-artifact@v4
        with:
          name: record-scanning-service-build
          path: record-scanning-service

      - name: Download Provapipe build
        uses: actions/download-artifact@v4
        with:
          name: provapipe-build
          path: provapipe

      - name: Download SDK build
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: sdk

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Set up Rust cache for snarkOS
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: snarkOS
          shared-key: snarkos-cache
          save-if: false

      - name: Set up Rust cache for Record Scanning Service
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: record-scanning-service
          shared-key: record-scanning-service-cache
          save-if: false

      - name: Set up Rust cache for Provapipe
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: provapipe
          shared-key: provapipe-cache
          save-if: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: sdk/yarn.lock

      - name: Run snarkOS tests
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cd snarkOS
          cargo test --release || true

      - name: Run Record Scanning Service tests
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cd record-scanning-service
          cargo test --release || true

      - name: Run Provapipe tests
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cd provapipe
          cargo test --release || true

      - name: Run SDK tests
        run: |
          cd sdk
          yarn test || true


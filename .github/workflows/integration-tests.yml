name: Integration Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snarkos-build:
    uses: ./.github/workflows/setup-snarkos.yml

  sdk-build:
    uses: ./.github/workflows/setup-sdk.yml

  integration-tests:
    needs: [snarkos-build, sdk-build]
    runs-on: ubuntu-latest-l
    steps:
      - name: Checkout integration test repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Download minimal snarkOS artifact (just the binary)
      - name: Download snarkOS binary
        uses: actions/download-artifact@v5
        with:
          name: snarkos-build
          path: local_build/snarkOS/target/release

      # Download minimal SDK artifact (just the tarball and wasm dist)
      - name: Download SDK build
        uses: actions/download-artifact@v5
        with:
          name: sdk-build
          path: local_build/sdk

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup snarkOS binary
        run: |
          chmod +x local_build/snarkOS/target/release/snarkos
          local_build/snarkOS/target/release/snarkos --version
          export SNARKOS_BINARY_PATH="${PWD}/local_build/snarkOS/target/release/snarkos"
          echo "SNARKOS_BINARY_PATH=$SNARKOS_BINARY_PATH" >> $GITHUB_ENV

      - name: Prepare SDK packages for integration tests
        run: |
          # SDK tarball is pre-built, just need to update test suite package.json files
          SDK_TARBALL="${PWD}/local_build/sdk/sdk-local.tgz"
          echo "Using pre-built SDK tarball: $SDK_TARBALL"
          
          # Extract version from tarball for verification
          SDK_LOCAL_VERSION=$(tar -xzf "$SDK_TARBALL" -O package/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")
          echo "SDK version: $SDK_LOCAL_VERSION"
          
          # Update test suite package.json files to use the tarball
          for testDir in tests/integration/*/; do
            if [ -f "$testDir/package.json" ]; then
              relPath=$(realpath --relative-to="$testDir" "$SDK_TARBALL")
              node -e "
                const fs = require('fs');
                const pkgPath = '$testDir/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                pkg.dependencies['@provablehq/sdk'] = 'file:$relPath';
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Updated: $testDir/package.json"
            fi
          done
          
          echo "SDK_TARBALL=$SDK_TARBALL" >> $GITHUB_ENV
          echo "SDK_LOCAL_VERSION=$SDK_LOCAL_VERSION" >> $GITHUB_ENV

      - name: Start snarkOS devnet
        run: |
          chmod +x tests/setup/start-devnet.sh
          ./tests/setup/start-devnet.sh

      - name: Wait for devnet readiness
        run: |
          chmod +x tests/setup/wait-for-devnet.sh
          ./tests/setup/wait-for-devnet.sh

      - name: Run integration tests
        run: |
          chmod +x tests/run-all-tests.sh
          # Use --dev flag since devnet is managed separately in CI
          # Use --skip-build flag since we downloaded artifacts
          ./tests/run-all-tests.sh --dev --skip-build || true

      - name: Stop snarkOS devnet
        if: always()
        run: |
          chmod +x tests/setup/stop-devnet.sh
          ./tests/setup/stop-devnet.sh || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-report
          path: test-results/test-report.json
          retention-days: 7

      - name: Post test summary
        if: always()
        run: |
          if [ -f test-results/github-summary.md ]; then
            echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
            cat test-results/github-summary.md >> $GITHUB_STEP_SUMMARY
          fi


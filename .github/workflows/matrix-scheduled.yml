name: Scheduled Compatibility Matrix

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_latest_only:
        description: 'Test only latest versions (skip older tags)'
        required: false
        type: boolean
        default: false

jobs:
  fetch-latest-versions:
    runs-on: ubuntu-latest
    outputs:
      snarkos_versions: ${{ steps.versions.outputs.snarkos }}
      sdk_versions: ${{ steps.versions.outputs.sdk }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch latest versions from GitHub
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read config
          VERSIONS_FILE="compatibility/versions.json"
          TEST_LATEST_N=$(jq -r '.test_latest_n_tags // 3' "$VERSIONS_FILE")
          INCLUDE_BRANCHES=$(jq -r '.include_branches // true' "$VERSIONS_FILE")
          
          if [ "${{ inputs.test_latest_only }}" == "true" ]; then
            TEST_LATEST_N=1
          fi
          
          # Fetch latest snarkOS tags
          SNARKOS_TAGS=$(gh api repos/provableHQ/snarkOS/tags --jq ".[0:$TEST_LATEST_N] | .[].name" | tr '\n' ',' | sed 's/,$//')
          
          # Fetch latest SDK tags
          SDK_TAGS=$(gh api repos/ProvableHQ/sdk/tags --jq ".[0:$TEST_LATEST_N] | .[].name" | tr '\n' ',' | sed 's/,$//')
          
          # Add branches if configured
          if [ "$INCLUDE_BRANCHES" == "true" ]; then
            SNARKOS_BRANCHES=$(jq -r '.snarkos.branches | join(",")' "$VERSIONS_FILE")
            SDK_BRANCHES=$(jq -r '.sdk.branches | join(",")' "$VERSIONS_FILE")
            
            if [ -n "$SNARKOS_BRANCHES" ]; then
              SNARKOS_TAGS="${SNARKOS_TAGS},${SNARKOS_BRANCHES}"
            fi
            if [ -n "$SDK_BRANCHES" ]; then
              SDK_TAGS="${SDK_TAGS},${SDK_BRANCHES}"
            fi
          fi
          
          echo "snarkOS versions: $SNARKOS_TAGS"
          echo "SDK versions: $SDK_TAGS"
          
          echo "snarkos=$SNARKOS_TAGS" >> $GITHUB_OUTPUT
          echo "sdk=$SDK_TAGS" >> $GITHUB_OUTPUT

  run-matrix:
    needs: fetch-latest-versions
    uses: ./.github/workflows/compatibility-matrix.yml
    with:
      snarkos_versions: ${{ needs.fetch-latest-versions.outputs.snarkos_versions }}
      sdk_versions: ${{ needs.fetch-latest-versions.outputs.sdk_versions }}
    permissions:
      contents: write
      pages: write
      id-token: write

